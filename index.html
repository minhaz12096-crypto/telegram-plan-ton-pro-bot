<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plant-TON Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #2c1b0e; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }

        /* 1. Video Loading Screen */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        video#bg-video { width: 100%; height: auto; border-radius: 10px; }
        .progress-container { width: 80%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4caf50; transition: 0.5s; }

        /* 2. Main Game UI */
        #main-game { display: none; height: 100vh; background: url('https://i.postimg.cc/0jLnTqx9/1775464928626.png') center/cover; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.4); }
        .stat-box { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }

        /* 3. Farm Grid */
        .farm-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            padding: 20px; height: 60vh; overflow-y: auto; margin-top: 50px;
        }
        .plot {
            background: rgba(101, 67, 33, 0.9); border: 2px solid #3e2723;
            border-radius: 12px; height: 110px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .plot.locked::after { content: '🔒'; font-size: 20px; opacity: 0.6; }

        /* 4. Bottom Menu */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #3e2723;
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 2px solid #5d4037;
        }
        .nav-item { text-align: center; cursor: pointer; color: #a1887f; font-size: 12px; }
        .nav-item.active { color: #fbc02d; font-weight: bold; }
        .nav-item img { width: 24px; height: 24px; display: block; margin: 0 auto 4px; }

        /* Popups */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; background: #f3e5f5; border: 4px solid #8d6e63; border-radius: 15px;
            color: #3e2723; padding: 20px; z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <video id="bg-video" autoplay muted playsinline>
            <source src="আপনার_ভিডিও_লিঙ্ক_এখানে.mp4" type="video/mp4">
        </video>
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="load-text" style="margin-top: 10px;">Loading...</p>
    </div>

    <div id="main-game">
        <div class="top-bar">
            <div class="stat-box">💎 <span id="bal-ton">0.0000</span></div>
            <div class="stat-box">📦 <span id="bal-beans">1800.5</span></div>
            <div onclick="openModal('settingsModal')">⚙️</div>
        </div>

        <div class="farm-grid" id="garden">
            </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home')">🏠<br><span class="t-home">Home</span></div>
            <div class="nav-item" onclick="openModal('walletModal')">💳<br><span class="t-wallet">Wallet</span></div>
            <div class="nav-item" onclick="openModal('settingsModal')">⚙️<br><span class="t-settings">Settings</span></div>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <h3 class="t-wallet">Wallet</h3><hr>
        <div style="margin: 15px 0;">
            <p>TON: <span id="w-bal">0.0000</span></p>
            <input type="number" placeholder="0.0000" id="w-amt" style="width:100%; padding:10px; margin:10px 0;">
            <button onclick="withdraw()" style="width:100%; background:#fbc02d; padding:10px; border:none; font-weight:bold;">Withdraw</button>
        </div>
        <button onclick="closeModal('walletModal')">Close</button>
    </div>

    <div id="settingsModal" class="modal">
        <h3 class="t-settings">Settings</h3><hr>
        <div style="padding: 10px 0;">
            <p>🌐 Language:</p>
            <select id="langSelect" onchange="applyLanguage()" style="width:100%; padding:8px;">
                <option value="en">English</option>
                <option value="bd">Bengali</option>
                <option value="ru">Russian</option>
                <option value="in">Hindi</option>
                <option value="cn">Chinese</option>
            </select>
        </div>
        <p>🎵 Music: <button onclick="toggleMusic()">ON/OFF</button></p>
        <button onclick="closeModal('settingsModal')">Close</button>
    </div>

    <script>
        // --- Language Database ---
        const langDict = {
            en: { home: "Home", wallet: "Wallet", settings: "Settings", load: "Loading..." },
            bd: { home: "হোম", wallet: "ওয়ালেট", settings: "সেটিংস", load: "লোড হচ্ছে..." },
            ru: { home: "Главная", wallet: "Кошелек", settings: "Настройки", load: "Загрузка..." },
            in: { home: "होम", wallet: "वॉलेट", settings: "सेटिंग्स", load: "लोड हो रहा है..." },
            cn: { home: "首页", wallet: "钱包", settings: "设置", load: "加载中..." }
        };

        function applyLanguage() {
            const lang = document.getElementById('langSelect').value;
            const d = langDict[lang];
            document.querySelector('.t-home').innerText = d.home;
            document.querySelectorAll('.t-wallet').forEach(el => el.innerText = d.wallet);
            document.querySelectorAll('.t-settings').forEach(el => el.innerText = d.settings);
            document.getElementById('load-text').innerText = d.load;
        }

        // --- Video Loader Logic ---
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('p-bar').style.width = progress + "%";
            if(progress >= 100) {
                clearInterval(interval);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
            }
        }, 150);

        // --- Modal Control ---
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- Initialize ---
        window.onload = () => {
            applyLanguage();
            // Load Farm Plots
            const grid = document.getElementById('garden');
            for(let i=1; i<=9; i++) {
                const plot = document.createElement('div');
                plot.className = 'plot locked';
                plot.innerHTML = `<span>x${i*5}</span>`;
                grid.appendChild(plot);
            }
        };
    </script>
</body>
</html>
