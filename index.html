<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plant-TON Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Poppins', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* Background & Overlay */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/0jLnTqx9/1775464928626.png') center/cover;
            filter: brightness(0.8); z-index: -1;
        }

        .screen { display: none; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* --- Farm Section --- */
        .farm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; overflow-y: auto; }
        .farm-card { background: rgba(0,0,0,0.6); border: 2px solid #4caf50; border-radius: 15px; padding: 10px; text-align: center; }
        .farm-card img { width: 80px; margin-bottom: 5px; }
        .farm-card h4 { margin: 5px 0; color: #fbc02d; }

        /* --- Team Section --- */
        .team-box { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-top: 10px; text-align: center; }
        .ref-link { background: #333; padding: 10px; border-radius: 5px; word-break: break-all; margin: 10px 0; font-size: 12px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.9); padding: 15px 0; border-top: 2px solid #4caf50; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; opacity: 0.6; }
        .nav-item.active-nav { opacity: 1; color: #4caf50; }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="home-screen" class="screen active">
        <div style="display: flex; justify-content: space-between;">
            <div id="ton-connect-button"></div>
            <div style="background: #8d6e63; padding: 5px 15px; border-radius: 20px; border: 2px solid #b8860b;">
                💰 <span id="balance">0.0000</span>
            </div>
        </div>
        <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
             <img src="https://i.postimg.cc/0jLnTqx9/1775464928626.png" style="width: 250px;" onclick="mine()">
        </div>
    </div>

    <div id="farm-screen" class="screen">
        <h2 style="text-align: center; color: #4caf50;">Farm Shop</h2>
        <div class="farm-grid">
            <div class="farm-card">
                <img src="https://i.ibb.co/VpXpZ6V/main-tree.png">
                <h4>Small Tree</h4>
                <p>0.5 TON</p>
                <button onclick="buyPlot(0.5)" style="background: #4caf50; border: none; color: white; padding: 5px 15px; border-radius: 5px;">Buy</button>
            </div>
            <div class="farm-card">
                <img src="https://i.ibb.co/VpXpZ6V/main-tree.png">
                <h4>Gold Crop</h4>
                <p>2.0 TON</p>
                <button onclick="buyPlot(2.0)" style="background: #4caf50; border: none; color: white; padding: 5px 15px; border-radius: 5px;">Buy</button>
            </div>
        </div>
    </div>

    <div id="team-screen" class="screen">
        <h2 style="text-align: center;">Referral Program</h2>
        <div class="team-box">
            <p>Invite friends and earn 10% commission on their mining!</p>
            <div class="ref-link" id="ref-url">https://t.me/your_bot?start=user123</div>
            <button onclick="copyRef()" style="background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 8px;">Copy Link</button>
        </div>
        <div style="margin-top: 20px;">
            <h3>Your Team: <span id="team-count">0</span></h3>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active-nav" onclick="showScreen('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="showScreen('farm')">🚜<br>Farm</div>
        <div class="nav-item" onclick="showScreen('team')">👥<br>Team</div>
    </div>

    <script>
        // --- 1. Firebase Initialize ---
        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6",
            measurementId: "G-SS1QH64NRJ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. Screen Navigation ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            
            document.getElementById(screenId + '-screen').classList.add('active');
            event.currentTarget.classList.add('active-nav');
        }

        // --- 3. TON Connect ---
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://telegram-plan-ton-pro-bot.vercel.app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // --- 4. Mining & DB ---
        let balance = 0;
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                balance = data.balance || 0;
                document.getElementById('balance').innerText = balance.toFixed(4);
            }
        });

        function mine() {
            balance += 0.0001;
            db.ref('users/' + userId).update({ balance: balance });
            tg.HapticFeedback.impactOccurred('light');
        }

        function buyPlot(price) {
            alert("Redirecting to TON Wallet for " + price + " TON...");
        }

        function copyRef() {
            const link = document.getElementById('ref-url').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("Link Copied!");
        }
    </script>
</body>
</html>
