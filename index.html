<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Plant-TON Pro Moon</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: url('https://i.imgur.com/your-full-moon-image.jpg') no-repeat center center/cover; /* এখানে আপনার চাঁদের ছবি দিন */
            font-family: Arial, sans-serif; overflow: hidden; color: white;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.5s;
        }
        #loading-moon {
            width: 150px; height: 150px; border-radius: 50%;
            background: url('https://i.imgur.com/your-full-moon-image.jpg') center/cover;
            box-shadow: 0 0 30px #f0e68c; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loading-text { margin-top: 20px; color: gold; font-weight: bold; font-size: 18px; }

        /* Main Game UI */
        #main-game { display: none; padding: 15px; height: 100%; box-sizing: border-box; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ton-connect-btn { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        .settings-area { display: flex; gap: 10px; }
        .icon-btn { background: rgba(0,0,0,0.6); color: white; border: 1px solid gray; padding: 8px; border-radius: 50%; cursor: pointer; }

        /* Grid System (10 slots) */
        .farm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .plot {
            background: rgba(0, 0, 0, 0.7); border: 2px solid #555; border-radius: 10px;
            height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .locked { filter: grayscale(100%); }
        .lock-icon { font-size: 24px; margin-bottom: 5px; }
        .buy-text { color: gold; font-size: 12px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>

    <div id="loading-screen">
        <div id="loading-moon"></div>
        <div class="loading-text" id="lang-loading">Loading Farm System...</div>
    </div>

    <div id="main-game">
        <div class="top-bar">
            <button class="ton-connect-btn" id="lang-connect">Connect Wallet</button>
            <div class="settings-area">
                <button class="icon-btn" onclick="toggleMusic()">🎵</button>
                <select id="language-select" class="icon-btn" onchange="changeLanguage()" style="border-radius: 10px; padding: 5px;">
                    <option value="en">🇺🇸 EN</option>
                    <option value="bn">🇧🇩 BN</option>
                    <option value="ru">🇷🇺 RU</option>
                    <option value="in">🇮🇳 IN</option>
                    <option value="de">🇩🇪 DE</option>
                    <option value="jp">🇯🇵 JP</option>
                </select>
            </div>
        </div>

        <div align="center"><h3 id="lang-title">Your Farm Empire</h3></div>

        <div class="farm-grid" id="farm-container">
            </div>
    </div>

    <script>
        // Language Dictionary
        const langDict = {
            en: { loading: "Loading Farm System...", connect: "Connect Wallet", title: "Your Farm Empire", buy: "Buy Plan" },
            bn: { loading: "ফার্ম লোড হচ্ছে...", connect: "ওয়ালেট কানেক্ট", title: "আপনার ফার্ম", buy: "প্ল্যান কিনুন" },
            ru: { loading: "Загрузка фермы...", connect: "Подключить", title: "Ваша ферма", buy: "Купить план" },
            in: { loading: "फार्म लोड हो रहा है...", connect: "वॉलेट कनेक्ट", title: "आपका फार्म", buy: "प्लान खरीदें" },
            de: { loading: "Farm wird geladen...", connect: "Wallet verbinden", title: "Deine Farm", buy: "Plan kaufen" },
            jp: { loading: "ファームを読み込んでいます...", connect: "ウォレット接続", title: "あなたの農場", buy: "プランを購入" }
        };

        // Loading Screen Logic (3 Seconds)
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
            }, 500);
        }, 3000);

        // Music Toggle
        let musicPlaying = false;
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            if (musicPlaying) { music.pause(); } 
            else { music.play(); }
            musicPlaying = !musicPlaying;
        }

        // Language Change Logic
        function changeLanguage() {
            const lang = document.getElementById('language-select').value;
            document.getElementById('lang-loading').innerText = langDict[lang].loading;
            document.getElementById('lang-connect').innerText = langDict[lang].connect;
            document.getElementById('lang-title').innerText = langDict[lang].title;
            renderPlots(); // Re-render to translate text inside plots
        }

        // Render 10 Locked Plots
        function renderPlots() {
            const container = document.getElementById('farm-container');
            container.innerHTML = '';
            const lang = document.getElementById('language-select').value;
            
            for(let i=0; i<10; i++) {
                container.innerHTML += `
                    <div class="plot locked" onclick="buyPlan(${i})">
                        <div class="lock-icon">🔒</div>
                        <div class="buy-text">${langDict[lang].buy}</div>
                    </div>
                `;
            }
        }
        
        function buyPlan(id) {
            // Here you will call backend/smart contract to pay TON and unlock
            alert("This will open TON payment for plot: " + (id+1));
        }

        renderPlots(); // Initial render
    </script>
</body>
</html>
