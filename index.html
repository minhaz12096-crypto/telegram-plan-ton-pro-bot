<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title> Ads Free Earn </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --secondary: #10B981;
      --accent: #F59E0B;
      --dark-bg: #121826;
      --card-bg: #1E293B;
      --text-light: #F1F5F9;
      --text-dim: #94A3B8;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    body {
      background: linear-gradient(135deg, var(--dark-bg), #0F172A);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(165deg, #1E293B, #0F172A);
      border-radius: 25px;
      overflow: hidden;
      box-shadow: var(--shadow-3d);
      position: relative;
    }

    /* 3D Background Elements */
    .bg-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floating-coin {
      position: absolute;
      width: 60px;
      height: 60px;
      background: linear-gradient(145deg, var(--accent), #D97706);
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
      animation: float 15s infinite linear;
      opacity: 0.7;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    .floating-coin:nth-child(1) { left: 10%; animation-delay: 0s; }
    .floating-coin:nth-child(2) { left: 20%; animation-delay: 2s; }
    .floating-coin:nth-child(3) { left: 30%; animation-delay: 4s; }
    .floating-coin:nth-child(4) { left: 40%; animation-delay: 6s; }

    /* Header */
    .header-3d {
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      padding: 25px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(145deg, var(--accent), #D97706);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
    }

    .app-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #e0e0e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle { color: rgba(255,255,255,0.8); font-size: 14px; }

    /* Content Area */
    .content { padding: 20px; position: relative; z-index: 1; }

    /* View Management */
    .view { display: none; animation: slideIn 0.4s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #task-view { display: block; }

    /* 3D Card Design */
    .card-3d {
      background: linear-gradient(145deg, var(--card-bg), #1a2438);
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-3d);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }

    /* Balance Display */
    .balance-display { text-align: center; margin-bottom: 10px; }
    .balance-label { font-size: 14px; color: var(--text-dim); margin-bottom: 5px; }
    .balance-amount {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }
    .stat-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; margin-bottom: 5px; color: #ffffff; }
    .stat-label { font-size: 12px; color: var(--text-dim); }

    /* Progress Circle */
    .progress-container { display: flex; justify-content: center; margin: 20px 0; }
    .progress-circle-3d {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) 0%, var(--card-bg) 0%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .progress-circle-3d::before {
      content: ''; position: absolute; width: 100px; height: 100px;
      background: var(--card-bg); border-radius: 50%;
    }
    .progress-text { position: relative; z-index: 1; font-size: 18px; font-weight: 700; }

    /* Buttons */
    .btn-3d {
      width: 100%; padding: 18px; font-size: 16px; font-weight: 700;
      border: none; border-radius: 15px; cursor: pointer; transition: all 0.3s ease;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      color: white; margin-bottom: 15px;
    }
    .btn-3d:disabled {
      background: linear-gradient(145deg, #374151, #1F2937);
      color: #9CA3AF; cursor: not-allowed;
    }
    .btn-success { background: linear-gradient(145deg, var(--secondary), #059669); }
    .btn-accent { background: linear-gradient(145deg, var(--accent), #D97706); }
    .btn-primary { background: linear-gradient(145deg, #3B82F6, #2563EB); }
    
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn-group .btn-3d { flex: 1; margin-bottom: 0; }

    /* Inputs */
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px; font-weight: 600; }
    .input-3d {
      width: 100%; padding: 16px; border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      color: var(--text-light); font-size: 16px;
    }
    .input-3d:focus { outline: none; border-color: var(--primary); }

    /* Footer Navigation */
    .footer-nav {
      display: flex; background: linear-gradient(145deg, var(--card-bg), #1a2438);
      padding: 10px; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .nav-btn {
      flex: 1; background: none; border: none; color: var(--text-dim);
      display: flex; flex-direction: column; align-items: center; font-size: 12px;
      cursor: pointer; padding: 8px 5px; border-radius: 12px;
    }
    .nav-btn.active { color: var(--primary); }
    .nav-icon {
      width: 28px; height: 28px; margin-bottom: 4px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn.active .nav-icon { background: linear-gradient(145deg, var(--primary), var(--primary-dark)); color: white;}

    /* Status Messages */
    .status-message {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 380px; padding: 16px 20px; border-radius: 15px;
      font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .status-success { background: #10B981; color: white; }
    .status-error { background: #EF4444; color: white; }
    .status-info { background: #3B82F6; color: white; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="bg-elements">
      <div class="floating-coin"></div><div class="floating-coin"></div>
      <div class="floating-coin"></div><div class="floating-coin"></div>
    </div>

    <div class="header-3d">
      <div class="logo-container">
        <div class="logo-icon"><i class="fas fa-coins" style="color: white; font-size: 24px;"></i></div>
        <div><h1 class="app-title">EarningUp</h1><p class="app-subtitle">Watch Ads & Earn Money</p></div>
      </div>
    </div>

    <div class="content">
      <div id="task-view" class="view">
        <div class="card-3d">
          <div class="balance-display">
            <div class="balance-label">Your Balance</div>
            <div class="balance-amount" id="balance-amount">$0.00</div>
          </div>

          <div class="stats-grid">
            <div class="stat-item"><div class="stat-value" id="watched-ads">0</div><div class="stat-label">Watched Ads</div></div>
            <div class="stat-item"><div class="stat-value" id="earned-points">0</div><div class="stat-label">Earned Points</div></div>
          </div>

          <div class="progress-container">
            <div class="progress-circle-3d" id="progress-circle"><div class="progress-text" id="progress-text">0%</div></div>
          </div>

          <button class="btn-3d btn-primary" id="manual-ad-btn" onclick="watchAd()">
            <i class="fas fa-video" style="margin-right: 8px;"></i>
            Watch Ad
          </button>

          <button class="btn-3d btn-accent" id="auto-ad-btn" onclick="startAutoAds()">
            <i class="fas fa-play-circle" style="margin-right: 8px;"></i>
            Auto Show Ads
          </button>

          <div class="btn-group">
            <button class="btn-3d" id="stop-auto-btn" onclick="stopAutoAds()" disabled>
              <i class="fas fa-stop" style="margin-right: 8px;"></i>
              Stop Auto
            </button>
            <button class="btn-3d btn-success" onclick="showView('withdraw-view')">
              <i class="fas fa-wallet" style="margin-right: 8px;"></i>
              Withdraw
            </button>
          </div>
        </div>
      </div>

      <div id="withdraw-view" class="view">
        <div class="card-3d">
          <h2 style="margin-bottom: 20px; text-align: center;"><i class="fas fa-wallet" style="margin-right: 10px;"></i>Withdraw Earnings</h2>
          <div class="balance-display" style="margin-bottom: 20px;">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount" id="withdraw-balance">$0.00</div>
          </div>
          <div class="input-group">
            <label class="input-label">Withdrawal Amount</label>
            <input type="number" class="input-3d" id="withdraw-amount" placeholder="Enter amount">
          </div>
          <div class="input-group">
            <label class="input-label">Payment Method</label>
            <select class="input-3d" id="payment-method">
              <option value="usdt">USDT</option><option value="ton">Ton</option><option value="paypal">PayPal</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Address</label>
            <input type="text" class="input-3d" id="withdraw-phone" placeholder="Enter your address">
          </div>
          <button class="btn-3d btn-success" onclick="withdrawPoints()"><i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Request Withdrawal</button>
        </div>
      </div>

      <div id="profile-view" class="view">
        <div class="card-3d">
          <h2 style="margin-bottom: 20px; text-align: center;"><i class="fas fa-user" style="margin-right: 10px;"></i>Your Profile</h2>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-value" id="profile-ads">0</div><div class="stat-label">Total Ads</div></div>
            <div class="stat-item"><div class="stat-value" id="profile-earnings">$0.00</div><div class="stat-label">Total Earnings</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-nav">
      <button class="nav-btn active" onclick="showView('task-view')"><div class="nav-icon"><i class="fas fa-tasks"></i></div><span>Tasks</span></button>
      <button class="nav-btn" onclick="showView('withdraw-view')"><div class="nav-icon"><i class="fas fa-wallet"></i></div><span>Withdraw</span></button>
      <button class="nav-btn" onclick="showView('profile-view')"><div class="nav-icon"><i class="fas fa-user"></i></div><span>Profile</span></button>
    </div>

    <div class="status-message" id="status-message"></div>
  </div>

  <script src='//libtl.com/sdk.js' data-zone='9804827' data-sdk='show_9804827'></script>

  <script>
    let watchedAdsCount = parseInt(localStorage.getItem('watchedAdsCount')) || 0;
    let earnedPoints = parseFloat(localStorage.getItem('earnedPoints')) || 0.00;
    
    let isAdPlaying = false;
    let isAutoRunning = false;
    let cooldownTimer;

    // Adsgram Initialization
    let adsgramController = null;
    if (window.Adsgram) {
      // আপনার Adsgram Block ID এখানে বসান
      adsgramController = window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID_HERE" }); 
    }

    document.addEventListener('DOMContentLoaded', updateUI);

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(view => view.style.display = 'none');
      document.getElementById(viewId).style.display = 'block';
      
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtnMap = {'task-view': 0, 'withdraw-view': 1, 'profile-view': 2};
      document.querySelectorAll('.nav-btn')[activeBtnMap[viewId]].classList.add('active');
      
      if (viewId === 'withdraw-view') document.getElementById('withdraw-balance').textContent = '$' + earnedPoints.toFixed(2);
      if (viewId === 'profile-view') {
        document.getElementById('profile-ads').textContent = watchedAdsCount;
        document.getElementById('profile-earnings').textContent = '$' + earnedPoints.toFixed(2);
      }
    }

    function updateUI() {
      document.getElementById('watched-ads').textContent = watchedAdsCount;
      document.getElementById('earned-points').textContent = earnedPoints.toFixed(2);
      document.getElementById('balance-amount').textContent = '$' + earnedPoints.toFixed(2);
      
      const percent = Math.min((watchedAdsCount / 100) * 100, 100);
      document.getElementById('progress-text').textContent = Math.floor(percent) + '%';
      document.getElementById('progress-circle').style.background = `conic-gradient(var(--primary) ${percent}%, var(--card-bg) ${percent}%)`;
    }

    // শুধুমাত্র সফলভাবে অ্যাড দেখলেই পয়েন্ট যোগ হবে
    function handleAdSuccess(networkName) {
      watchedAdsCount++;
      earnedPoints += 0.5;
      localStorage.setItem('watchedAdsCount', watchedAdsCount);
      localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
      updateUI();
      showStatus(`Success! +$0.50 added from ${networkName}.`, 'success');
    }

    // ৫ সেকেন্ডের টাইমার
    function startCooldown(callback) {
      let timeLeft = 5;
      const btn = document.getElementById('manual-ad-btn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-clock" style="margin-right: 8px;"></i> Wait ${timeLeft}s...`;

      cooldownTimer = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          btn.innerHTML = `<i class="fas fa-clock" style="margin-right: 8px;"></i> Wait ${timeLeft}s...`;
        } else {
          clearInterval(cooldownTimer);
          btn.disabled = false;
          btn.innerHTML = `<i class="fas fa-video" style="margin-right: 8px;"></i> Watch Ad`;
          
          // টাইমার শেষ হলে পরবর্তী অটো অ্যাড চালু করবে (যদি অটো অন থাকে)
          if (callback) callback();
        }
      }, 1000);
    }

    // অ্যাড ফিনিশ/ফেইল হওয়ার পর কল হবে
    function onAdFinished() {
      isAdPlaying = false;
      startCooldown(() => {
        if (isAutoRunning) {
          watchAd(); // অটো অ্যাড চালু থাকলে আবার অ্যাড কল করবে
        }
      });
    }

    // মেইন ওয়াচ অ্যাড ফাংশন
    function watchAd() {
      if (isAdPlaying || document.getElementById('manual-ad-btn').disabled) return;
      isAdPlaying = true;

      const isMonetagTurn = (watchedAdsCount % 2 === 0);

      if (isMonetagTurn) {
        // Monetag Ad
        if (typeof show_9804827 === 'function') {
          show_9804827().then(() => {
            handleAdSuccess("Monetag");
            onAdFinished();
          }).catch(err => {
            console.error('Monetag Ad error:', err);
            showStatus('Monetag ad failed. No points added.', 'error');
            onAdFinished(); // ফেইল হলেও টাইমার উঠবে
          });
        } else {
          showStatus('Monetag is not ready yet.', 'error');
          onAdFinished();
        }
      } else {
        // Adsgram Ad
        if (adsgramController) {
          adsgramController.show().then((result) => {
            handleAdSuccess("Adsgram");
            onAdFinished();
          }).catch((result) => {
            console.error('Adsgram Ad error:', result);
            showStatus('Adsgram ad failed or skipped. No points added.', 'error');
            onAdFinished();
          });
        } else {
          showStatus('Adsgram is not ready yet.', 'error');
          onAdFinished();
        }
      }
    }

    // Auto Ad Control
    function startAutoAds() {
      isAutoRunning = true;
      document.getElementById('auto-ad-btn').disabled = true;
      document.getElementById('stop-auto-btn').disabled = false;
      showStatus('Auto ads started!', 'info');
      
      // যদি বর্তমানে অ্যাড প্লে না হয়ে থাকে বা টাইমার না চলে, তবে অ্যাড চালু করবে
      if (!isAdPlaying && !document.getElementById('manual-ad-btn').disabled) {
        watchAd();
      }
    }

    function stopAutoAds() {
      isAutoRunning = false;
      document.getElementById('auto-ad-btn').disabled = false;
      document.getElementById('stop-auto-btn').disabled = true;
      showStatus('Auto ads stopped.', 'info');
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('status-message');
      statusEl.textContent = message;
      statusEl.className = `status-message status-${type}`;
      statusEl.style.display = 'block';
      setTimeout(() => statusEl.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
