<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>File Creator Bot</title>

<script>
  // ════════════════════════════════════════
  //  BLOCK ALL alert / confirm / prompt
  //  so Adsgram errors are NEVER visible
  // ════════════════════════════════════════
  window.alert   = function() {};
  window.confirm = function() { return true; };
  window.prompt  = function() { return ""; };
  
</script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f2f2f7;
    color: #111;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .topbar {
    background: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg,#1a73e8,#7c5af7);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .topbar-name {
    font-size: 17px;
    font-weight: 700;
    color: #1a73e8;
  }

  .form-wrap {
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .field-label {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    margin-bottom: 8px;
  }

  .name-row {
    display: flex;
    align-items: center;
    border: 1.5px solid #ccc;
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
  }
  .name-row:focus-within { border-color: #1a73e8; }
  .name-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    padding: 13px 14px;
    background: transparent;
    color: #111;
  }
  .name-row input::placeholder { color: #aaa; }
  .ext-tag {
    padding: 0 14px;
    font-size: 15px;
    font-weight: 700;
    color: #111;
    background: #f2f2f7;
    border-left: 1.5px solid #ccc;
    min-height: 48px;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .select-wrap { position: relative; }
  .select-wrap select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    border: 1.5px solid #1a73e8;
    border-radius: 10px;
    background: #fff;
    color: #111;
    font-size: 15px;
    padding: 13px 44px 13px 14px;
    outline: none;
    cursor: pointer;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: #555;
    pointer-events: none;
  }

  .content-box {
    width: 100%;
    border: 1.5px solid #ccc;
    border-radius: 10px;
    background: #fff;
    color: #111;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 13px 14px;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color .2s;
  }
  .content-box:focus { border-color: #1a73e8; }
  .content-box::placeholder { color: #aaa; font-family: 'Segoe UI', Arial, sans-serif; }

  .ads-notice {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: #795548;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .convert-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #1a73e8;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .2s, transform .1s;
    box-shadow: 0 2px 8px rgba(26,115,232,.25);
  }
  .convert-btn:active   { background: #1558b0; transform: scale(.99); }
  .convert-btn:disabled { background: #90baf9; cursor: not-allowed; }

  /* Ad overlay */
  #adOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 999;
    align-items: flex-end;
    justify-content: center;
  }
  #adOverlay.active { display: flex; }

  .ad-sheet {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 36px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .ad-icon  { font-size: 46px; margin-bottom: 12px; }
  .ad-sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #111; }
  .ad-sheet p  { font-size: 13px; color: #666; margin-bottom: 22px; line-height: 1.6; }

  .ring-wrap {
    position: relative;
    width: 68px; height: 68px;
    margin: 0 auto 12px;
  }
  .ring-svg   { width: 68px; height: 68px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: #e0e0e0; stroke-width: 5; }
  .ring-fill  {
    fill: none;
    stroke: #1a73e8;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 175.9;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke .3s;
  }
  .ring-num {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; font-weight: 700; color: #111;
  }

  #adStatusText { font-size: 13px; color: #888; margin-bottom: 14px; }

  .done-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .done-btn:active { opacity: .85; }

  #toast {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: #22c55e;
    color: #fff;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    transition: transform .3s;
    z-index: 9999;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show  { transform: translateX(-50%) translateY(0); }
  #toast.error { background: #ef4444; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">📁</div>
  <div class="topbar-name">File Creator Bot</div>
</div>

<div class="form-wrap">

  <div>
    <div class="field-label">File Name:</div>
    <div class="name-row">
      <input type="text" id="fileName" placeholder="Enter file name" autocomplete="off" spellcheck="false">
      <div class="ext-tag" id="extTag">.html</div>
    </div>
  </div>

  <div>
    <div class="field-label">File Type:</div>
    <div class="select-wrap">
      <select id="fileType" onchange="onTypeChange()">
        <option value="html">HTML File (.html)</option>
        <option value="css">CSS File (.css)</option>
        <option value="js">JavaScript File (.js)</option>
        <option value="py">Python File (.py)</option>
        <option value="json">JSON File (.json)</option>
        <option value="xml">XML File (.xml)</option>
        <option value="svg">SVG File (.svg)</option>
        <option value="php">PHP File (.php)</option>
        <option value="sql">SQL File (.sql)</option>
        <option value="txt">Text File (.txt)</option>
        <option value="md">Markdown File (.md)</option>
        <option value="sh">Shell File (.sh)</option>
      </select>
    </div>
  </div>

  <div>
    <div class="field-label">File Content:</div>
    <textarea class="content-box" id="fileContent"
      placeholder="Enter your code or content here..."></textarea>
  </div>

  <div class="ads-notice">
    📢 A short ad will appear before your file is created.
  </div>

  <button class="convert-btn" id="createBtn" onclick="startAdFlow()">
    📄➤ &nbsp;Create File
  </button>

</div>

<!-- Ad Overlay -->
<div id="adOverlay">
  <div class="ad-sheet">
    <div class="ad-icon">📢</div>
    <h3>Short Ad Playing</h3>
    <p>Your file will be created automatically<br>right after the ad finishes.</p>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 68 68">
        <circle class="ring-track" cx="34" cy="34" r="28"/>
        <circle class="ring-fill" id="ringFill" cx="34" cy="34" r="28"/>
      </svg>
      <div class="ring-num" id="ringNum">5</div>
    </div>

    <div id="adStatusText">Loading ad...</div>
    <button class="done-btn" id="doneBtn" onclick="finishAd()">✅ Continue → Create File</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════
//  ★ PUT YOUR BLOCK ID HERE ★
//  Example: "27419" or "int-12345"
// ════════════════════════════════
const ADSGRAM_BLOCK_ID = "27419";   // ← replace with your real Block ID
const AD_SECONDS       = 5;
const CIRCUMF          = 175.9;     // 2 * π * 28

const tg     = window.Telegram?.WebApp;
let adDone   = false;
let timer    = null;
let secsLeft = AD_SECONDS;

if (tg) { tg.ready(); tg.expand(); }

function onTypeChange() {
  document.getElementById("extTag").textContent =
    "." + document.getElementById("fileType").value;
}

function showToast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (isError ? " error" : "");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = "", 3200);
}

function validate() {
  if (!document.getElementById("fileName").value.trim())
    return showToast("⚠️ Please enter a file name!", true), false;
  if (!document.getElementById("fileContent").value.trim())
    return showToast("⚠️ Please enter file content!", true), false;
  return true;
}

function setRing(s) {
  const offset = CIRCUMF * (1 - s / AD_SECONDS);
  const ring   = document.getElementById("ringFill");
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = s > 1 ? "#1a73e8" : "#22c55e";
  document.getElementById("ringNum").textContent = s;
}

// Fallback countdown — silent, no errors shown
function startCountdown() {
  secsLeft = AD_SECONDS;
  setRing(secsLeft);
  document.getElementById("adStatusText").textContent = "Please wait...";
  document.getElementById("doneBtn").style.display = "none";
  clearInterval(timer);

  timer = setInterval(() => {
    secsLeft--;
    setRing(secsLeft);
    if (secsLeft <= 0) {
      clearInterval(timer); timer = null;
      document.getElementById("adStatusText").textContent = "✅ Creating your file...";
      document.getElementById("doneBtn").style.display = "block";
      setTimeout(() => finishAd(), 900);
    }
  }, 1000);
}

function startAdFlow() {
  if (!validate()) return;
  adDone = false;

  document.getElementById("adOverlay").classList.add("active");
  document.getElementById("doneBtn").style.display  = "none";
  document.getElementById("adStatusText").textContent = "Loading ad...";
  setRing(AD_SECONDS);

  // Try Adsgram — any error silently falls back to countdown
  if (window.Adsgram) {
    try {
      const ctrl = window.Adsgram.init({ blockId: String(ADSGRAM_BLOCK_ID) });
      const p = ctrl.show ? ctrl.show() : ctrl;
      Promise.resolve(p)
        .then(() => {
          clearInterval(timer);
          document.getElementById("adStatusText").textContent = "✅ Ad complete!";
          setTimeout(() => finishAd(), 700);
        })
        .catch(() => startCountdown()); // silent fallback
    } catch (e) {
      startCountdown();
    }
  } else {
    startCountdown();
  }
}

function finishAd() {
  if (adDone) return;
  adDone = true;
  clearInterval(timer);
  document.getElementById("adOverlay").classList.remove("active");
  createFile();
}

function createFile() {
  const rawName  = document.getElementById("fileName").value.trim();
  const content  = document.getElementById("fileContent").value;
  const ext      = document.getElementById("fileType").value;
  const fullName = rawName.replace(/\.[^/.]+$/, "") + "." + ext;

  const payload = JSON.stringify({
    action:   "create_file",
    fileName: fullName,
    fileType: ext,
    content:  content,
    size:     new Blob([content]).size,
    userId:   tg?.initDataUnsafe?.user?.id || "unknown"
  });

  if (tg && tg.sendData) {
    try {
      tg.sendData(payload);
      showToast('✅ "' + fullName + '" sent to bot!');
      setTimeout(() => {
        document.getElementById("fileName").value    = "";
        document.getElementById("fileContent").value = "";
      }, 1200);
    } catch (e) {
      showToast('✅ "' + fullName + '" created!');
    }
  } else {
    const blob = new Blob([content], { type: "text/plain" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = fullName; a.click();
    URL.revokeObjectURL(url);
    showToast('✅ "' + fullName + '" downloaded!');
  }
}

// Load Adsgram SDK silently
(function () {
  const s   = document.createElement("script");
  s.src     = "https://sad.adsgram.ai/js/sad.min.js";
  s.async   = true;
  s.onerror = () => {};   // silent if CDN fails
  document.head.appendChild(s);
})();
</script>
</body>
</html>
