<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Link Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="//libtl.com/sdk.js" data-zone="10803234" data-sdk="show_10803234"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <script src="https://ad.gigapub.tech/script?id=6150"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: var(--tg-theme-button-color, #3390ec); }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 16px;
        }
        button.generate-btn {
            padding: 12px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .results {
            display: none;
            background: var(--tg-theme-secondary-bg-color, #2c2c2c);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .link-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }
        .link-item:last-child { border-bottom: none; }
        .link-title { font-weight: bold; margin-bottom: 5px; display: block; }
        .link-url {
            word-break: break-all;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn { background-color: #4CAF50; color: white; }
        .download-btn { background-color: #ff9800; color: white; }
        
        /* Loading Overlay for Ad Process */
        #adOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 18px;
            text-align: center;
            flex-direction: column;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #3390ec;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Media Finder App</h2>
        
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Enter image, video, or photo name...">
            <button class="generate-btn" onclick="generateLinks()">Search & Generate Links</button>
        </div>

        <div class="results" id="resultsContainer">
            <div class="link-item">
                <span class="link-title">1. Direct Link</span>
                <div class="link-url" id="link-direct">waiting...</div>
                <div class="action-buttons">
                    <button class="action-btn copy-btn" onclick="handleAction('copy', 'link-direct')">Copy</button>
                </div>
            </div>
            
            <div class="link-item">
                <span class="link-title">2. .PNG Link</span>
                <div class="link-url" id="link-png">waiting...</div>
                <div class="action-buttons">
                    <button class="action-btn copy-btn" onclick="handleAction('copy', 'link-png')">Copy</button>
                    <button class="action-btn download-btn" onclick="handleAction('download', 'link-png')">Download</button>
                </div>
            </div>

            <div class="link-item">
                <span class="link-title">3. MP4 Link</span>
                <div class="link-url" id="link-mp4">waiting...</div>
                <div class="action-buttons">
                    <button class="action-btn copy-btn" onclick="handleAction('copy', 'link-mp4')">Copy</button>
                    <button class="action-btn download-btn" onclick="handleAction('download', 'link-mp4')">Download</button>
                </div>
            </div>

            <div class="link-item">
                <span class="link-title">4. General Download Link</span>
                <div class="link-url" id="link-dl">waiting...</div>
                <div class="action-buttons">
                    <button class="action-btn copy-btn" onclick="handleAction('copy', 'link-dl')">Copy</button>
                    <button class="action-btn download-btn" onclick="handleAction('download', 'link-dl')">Download</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adOverlay">
        <div class="spinner"></div>
        <div id="adMessage">Preparing links & loading sponsors...<br>Please wait a moment.</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Updated URLs with the provided Image sites
        const configUrls = {
            withKeys: [
                { url: "https://imagen.network/api/v1/", key: "API_KEY_1" },
                { url: "https://yandex.ru/images/api/", key: "API_KEY_2" },
                { url: "https://api.imagesite3.com/", key: "API_KEY_3" },
                { url: "https://api.imagesite4.com/", key: "API_KEY_4" },
                { url: "https://api.imagesite5.com/", key: "API_KEY_5" }
            ],
            withoutKeys: [
                { url: "https://imagen.network/view/" },
                { url: "https://yandex.ru/images/search/" },
                { url: "https://genericsite3.com/media/" },
                { url: "https://genericsite4.com/media/" },
                { url: "https://genericsite5.com/media/" }
            ]
        };

        function generateLinks() {
            const query = document.getElementById('searchInput').value.trim().replace(/\s+/g, '-');
            if (!query) {
                tg.showAlert("Please enter a name first.");
                return;
            }

            // Using the first setup (imagen.network & yandex examples)
            const baseUrlWithKey = configUrls.withKeys[0].url;
            const key = configUrls.withKeys[0].key;
            const baseUrlWithoutKey = configUrls.withoutKeys[1].url;

            document.getElementById('link-direct').innerText = `${baseUrlWithoutKey}?text=${query}`;
            document.getElementById('link-png').innerText = `${baseUrlWithKey}search?q=${query}&format=png&apikey=${key}`;
            document.getElementById('link-mp4').innerText = `${baseUrlWithKey}search?q=${query}&format=mp4&apikey=${key}`;
            document.getElementById('link-dl').innerText = `https://imagen.network/download/${query}`;

            document.getElementById('resultsContainer').style.display = 'block';
        }

        // ==========================================
        // ADVERTISEMENT SYSTEM
        // ==========================================

        async function triggerThreeAds() {
            const adOverlay = document.getElementById('adOverlay');
            adOverlay.style.display = 'flex';
            
            try {
                // 1. Trigger Monetag (using the function from the data-sdk attribute)
                if (typeof show_10803234 === 'function') {
                    console.log("Triggering Monetag...");
                    try { await show_10803234(); } catch(e) { console.log("Monetag skipped/blocked"); }
                }

                // 2. Trigger Adsgram (Block ID: 26272)
                if (window.Adsgram) {
                    console.log("Triggering Adsgram...");
                    const AdController = window.Adsgram.init({ blockId: "26272" });
                    try { 
                        await AdController.show(); 
                    } catch(e) { 
                        console.log("Adsgram skipped/blocked"); 
                    }
                }

                // 3. Gigapub is auto-loaded via the script tag in head.
                // We just add a small delay to ensure visibility / tracking.
                console.log("Processing Gigapub...");
                await new Promise(resolve => setTimeout(resolve, 1500));

            } catch (error) {
                console.error("Ad sequence error", error);
            } finally {
                // Hide overlay after ad process finishes
                adOverlay.style.display = 'none';
            }
        }

        async function handleAction(actionType, elementId) {
            const linkText = document.getElementById(elementId).innerText;
            if(linkText === "waiting...") return;

            // Trigger the 3 ads first
            await triggerThreeAds();

            // Execute action after ads
            if (actionType === 'copy') {
                navigator.clipboard.writeText(linkText).then(() => {
                    tg.showAlert("Link Copied Successfully!");
                }).catch(err => {
                    alert("Copy failed. Link: " + linkText);
                });
            } 
            else if (actionType === 'download') {
                tg.showAlert("Starting Download...");
                window.open(linkText, '_blank');
            }
        }
    </script>
</body>
</html>
