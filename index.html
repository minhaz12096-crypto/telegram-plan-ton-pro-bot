<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Premium TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        
        /* Loading Screen - Full Moon */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://i.imgur.com/your-full-moon-photo.jpg') no-repeat center center;
            background-size: cover; z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .loader-text { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #fff; margin-top: 200px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Main UI */
        #mainApp { display: none; padding: 20px; height: 100vh; overflow-y: scroll; background: linear-gradient(to bottom, #16222A, #3A6073); }
        
        .header { display: flex; justify-content: space-between; align-items: center; }
        .balance-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; font-size: 18px; }
        
        /* Settings Icon */
        .settings-btn { background: #4CAF50; border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-size: 20px; }

        /* Slots / Plans */
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .slot { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; text-align: center; border: 2px solid transparent; }
        .slot.locked { border-color: #555; opacity: 0.7; }
        .slot.unlocked { border-color: #FFD700; background: rgba(255, 215, 0, 0.1); }
        .slot img { width: 80px; margin-bottom: 10px; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #EEDC9A; color: #5D4037; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        .close-btn { float: right; background: none; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
        
        button.action-btn { background: #FFA500; border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="loadingScreen">
        <div class="loader-text">Loading...</div>
    </div>

    <div id="mainApp">
        <div class="header">
            <div id="ton-connect"></div> <div class="balance-box">TON: <span id="userBalance">0.00</span></div>
            <button class="settings-btn" onclick="openModal('settingsModal')">⚙️</button>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="requestWithdraw()">💸 Withdraw</button>
            <button class="action-btn" style="background:#0088cc;" onclick="completeTask()">📢 Complete Task (0.05 TON)</button>
        </div>

        <div class="slot-grid">
            <div class="slot unlocked">
                <h3>Plan 1</h3>
                <p>3 Days - High Profit</p>
                <button class="action-btn" style="width: auto; padding: 5px 10px;">Active</button>
            </div>
            <div class="slot locked">
                <h3>Plan 2</h3>
                <p>30 Days - Max Profit</p>
                <button class="action-btn" style="width: auto; padding: 5px 10px; background: #555;">Unlock</button>
            </div>
            <div class="slot locked"><h3>🔒</h3></div>
            <div class="slot locked"><h3>🔒</h3></div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('settingsModal')">X</button>
            <h2>Settings</h2>
            
            <div style="margin: 20px 0; text-align: left;">
                <h3>Language:</h3>
                <select id="langSelect" style="width: 100%; padding: 10px; border-radius: 5px;">
                    <option value="bn">Bangladesh (বাংলা)</option>
                    <option value="en">American (English)</option>
                    <option value="ru">Russian (Русский)</option>
                    <option value="in">India (हिन्दी)</option>
                    <option value="jp">Japan (日本語)</option>
                    <option value="de">Germany (Deutsch)</option>
                </select>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <h3>Music</h3>
                <button id="musicToggle" class="action-btn" style="width: 50px;" onclick="toggleMusic()">🔇</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Loading Screen Logic (3 Seconds)
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }, 3000);

        // 2. Music Toggle Logic
        let musicOn = false;
        const bgMusic = document.getElementById('bgMusic');
        function toggleMusic() {
            if (musicOn) {
                bgMusic.pause();
                document.getElementById('musicToggle').innerText = '🔇';
            } else {
                bgMusic.play();
                document.getElementById('musicToggle').innerText = '🔊';
            }
            musicOn = !musicOn;
        }

        // 3. TON Connect Integration
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://your-domain.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // 4. Modal Open/Close
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 5. Withdraw Logic (Minimum Logic Included)
        let balance = 0.05; // Example balance
        const MIN_WITHDRAW = 1.0;

        function requestWithdraw() {
            if (!tonConnectUI.wallet) {
                alert("Please connect your TON wallet first!");
                return;
            }
            if (balance < MIN_WITHDRAW) {
                alert(`Minimum withdraw limit is ${MIN_WITHDRAW} TON. You have ${balance} TON.`);
                return;
            }
            // Real system e ekhane backend e API call jabe Admin er kache
            alert("Withdraw request sent to Admin! Wait for approval.");
        }

        // 6. Task Logic (Sends data to Telegram bot)
        function completeTask() {
            const tg = window.Telegram.WebApp;
            tg.sendData("check_task_channel_1");
            alert("Checking Telegram membership... You will receive 0.05 TON if joined!");
        }
    </script>
</body>
</html>
