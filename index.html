<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plant-TON Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/js-sdk/direct-ads.js"></script> <style>
        :root { --p: #4caf50; --s: #8d6e63; --gold: #fbc02d; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Arial', sans-serif; background: #000; color: #fff; overflow: hidden; }

        /* 1. Video Loader */
        #video-loader { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        #video-loader video { width: 100%; height: 100%; object-fit: cover; }

        /* 2. Main UI */
        #app { display: none; height: 100vh; background: url('https://i.postimg.cc/0jLnTqx9/1775464928626.png') center/cover; position: relative; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.6); align-items: center; }
        .stat { background: var(--s); border: 2px solid var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 14px; }

        /* 3. Farm Plots (আলু, আম, কাঁঠাল...) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .plot { height: 110px; background: rgba(139, 69, 19, 0.9); border: 2px solid #5d4037; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        .plot.locked::after { content: '🔒'; font-size: 20px; opacity: 0.6; }
        .plot b { font-size: 12px; color: var(--gold); }

        /* 4. Modals (Wallet, Settings, Tasks) */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #edc9a1; border: 4px solid var(--s); border-radius: 20px; padding: 20px; z-index: 1000; color: #2c1b0e; }
        .modal-h { font-size: 18px; font-weight: bold; text-align: center; border-bottom: 2px solid var(--s); margin-bottom: 15px; padding-bottom: 5px; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; color: #fff; cursor: pointer; display: flex; justify-content: space-between; }
        .p-btn { background: #4caf50; } .t-btn { background: #2196f3; } .r-btn { background: #ff9800; }
        .ads-counter { font-size: 12px; color: #d32f2f; font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* 5. Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #3e2723; padding: 12px 0; border-top: 2px solid var(--p); }
        .nav-i { text-align: center; font-size: 11px; opacity: 0.7; cursor: pointer; }
        .nav-i.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

    <div id="video-loader">
        <video id="intro-vid" autoplay muted playsinline>
            <source src="VID_20260406_150234_927.mp4" type="video/mp4">
        </video>
    </div>

    <div id="app">
        <div class="header">
            <div class="stat">💎 <span id="bal">0.0000</span></div>
            <div id="ton-connect-button"></div>
            <div onclick="openM('set-m')">⚙️</div>
        </div>

        <div class="grid" id="farm-grid">
            </div>

        <div class="nav">
            <div class="nav-i active" onclick="location.reload()">🏠<br><span class="l-h">Home</span></div>
            <div class="nav-i" onclick="openM('wal-m')">💳<br><span class="l-w">Wallet</span></div>
            <div class="nav-i" onclick="openM('set-m')">⚙️<br><span class="l-s">Settings</span></div>
        </div>
    </div>

    <div id="unlock-m" class="modal">
        <div class="modal-h" id="u-title">Unlock Plot</div>
        <button class="btn p-btn" onclick="handleU('pay')"><span>Pay TON</span> <span id="u-cost"></span></button>
        <button class="btn t-btn" onclick="handleU('task')"><span>Tasks</span> <span>5/5</span></button>
        <button class="btn r-btn" onclick="handleU('ref')"><span>Refer</span> <span id="u-ref"></span></button>
        <button onclick="closeM('unlock-m')" style="width:100%; margin-top:10px;">Close</button>
    </div>

    <div id="wal-m" class="modal">
        <div class="modal-h l-w">Wallet</div>
        <div class="ads-counter" id="ads-info">Ads watched: 0/10</div>
        <p>Balance: <b id="w-bal">0.0000</b> TON</p>
        <button class="btn t-btn" onclick="showAd()">Watch Ad to Unlock Withdraw</button>
        <input type="number" id="w-amt" placeholder="Min 1 TON" style="width:90%; padding:10px; margin:10px 0;">
        <button class="btn p-btn" onclick="checkWithdraw()">WITHDRAW</button>
        <button onclick="closeM('wal-m')" style="width:100%;">Close</button>
    </div>

    <div id="set-m" class="modal">
        <div class="modal-h l-s">Settings</div>
        <select id="lang" onchange="upLang()" style="width:100%; padding:10px;">
            <option value="en">English</option>
            <option value="bd">Bengali</option>
            <option value="ru">Russian</option>
            <option value="in">Hindi</option>
            <option value="cn">Chinese</option>
        </select>
        <button class="btn r-btn" onclick="openM('faq-m')" style="margin-top:15px; justify-content:center;">FAQ</button>
        <button onclick="closeM('set-m')" style="width:100%; margin-top:10px;">Close</button>
    </div>

    <script>
        // 1. Config
        const firebaseConfig = { apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U", authDomain: "tonnow-pro.firebaseapp.com", databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com", projectId: "tonnow-pro", storageBucket: "tonnow-pro.firebasestorage.app", messagingSenderId: "585362095075", appId: "1:585362095075:web:a94096a650ab74f3e03ed6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe?.user?.id || "dev_user";
        let adsWatched = 0;

        // 2. Video End
        document.getElementById('intro-vid').onended = () => {
            document.getElementById('video-loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        };

        // 3. TON Connect
        const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://telegram-plan-ton-pro-bot.vercel.app/tonconnect-manifest.json', buttonRootId: 'ton-connect-button' });

        // 4. Farm Items
        const items = [
            {id:1, n:"Potato (আলু)", c:0.5, r:5}, {id:2, n:"Mango (আম)", c:1, r:10}, {id:3, n:"Jackfruit (কাঁঠাল)", c:2, r:20},
            {id:4, n:"Papaya (পেঁপে)", c:5, r:40}, {id:5, n:"Carrot (গাজর)", c:10, r:80}, {id:6, n:"Eggplant (বেগুন)", c:20, r:150}
        ];

        let selId = null;
        function render() {
            const g = document.getElementById('farm-grid');
            items.forEach(i => {
                const d = document.createElement('div');
                d.className = 'plot locked';
                d.innerHTML = `<b>${i.n}</b><br><small>${i.c} TON</small>`;
                d.onclick = () => { selId = i.id; document.getElementById('u-title').innerText = i.n; document.getElementById('u-cost').innerText = i.c+" TON"; document.getElementById('u-ref').innerText = i.r; openM('unlock-m'); };
                g.appendChild(d);
            });
        }

        // 5. Adsgram Logic (Withdrawal Limit)
        const AdController = window.Adsgram.init({ blockId: "2627" }); // Your Adsgram Block ID

        async function showAd() {
            AdController.show().then(() => {
                adsWatched++;
                db.ref('users/'+uid).update({ ads: adsWatched });
                updateAdsUI();
                tg.showAlert("Ad watched! Total: " + adsWatched + "/10");
            }).catch(() => tg.showAlert("Ad failed to load."));
        }

        function updateAdsUI() {
            document.getElementById('ads-info').innerText = `Ads watched: ${adsWatched}/10`;
            if(adsWatched >= 10) document.getElementById('ads-info').style.color = "green";
        }

        function checkWithdraw() {
            if(adsWatched < 10) return tg.showAlert("You must watch at least 10 ads before you can withdraw!");
            const amt = document.getElementById('w-amt').value;
            if(amt < 1) return tg.showAlert("Minimum 1 TON");
            tg.showAlert("Withdrawal request sent!");
        }

        // 6. DB Sync
        db.ref('users/'+uid).on('value', s => {
            if(s.val()) {
                adsWatched = s.val().ads || 0;
                document.getElementById('bal').innerText = (s.val().balance || 0).toFixed(4);
                document.getElementById('w-bal').innerText = (s.val().balance || 0).toFixed(4);
                updateAdsUI();
            }
        });

        // 7. Handlers
        function openM(id) { document.getElementById(id).style.display = 'block'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        
        async function handleU(t) {
            const i = items.find(x => x.id === selId);
            if(t === 'pay') {
                if(!tonUI.connected) return tg.showAlert("Connect Wallet!");
                const tx = { validUntil: Date.now()+60, messages: [{ address: "UQCgHCVc-ZZ-L9UjN4-yjUAHn2ydmfqQvPVywZrrQYQP-Qkj", amount: (i.c * 1e9).toString() }] };
                try { await tonUI.sendTransaction(tx); activate(); } catch(e){}
            } else tg.showAlert("Not enough tasks or referrals!");
        }
        function activate() { db.ref('users/'+uid+'/plots/'+selId).set({ active:true, exp: Date.now()+(24*3600000) }); tg.showAlert("Unlocked!"); closeM('unlock-m'); }

        const lMap = { en:{h:"Home",w:"Wallet",s:"Settings"}, bd:{h:"হোম",w:"ওয়ালেট",s:"সেটিংস"}, ru:{h:"Дом",w:"Кошелек",s:"Настройки"}, in:{h:"घर",w:"वॉलेट",s:"सेटिंग्स"}, cn:{h:"首页",w:"钱包",s:"设置"} };
        function upLang() { const v = document.getElementById('lang').value; document.querySelector('.l-h').innerText=lMap[v].h; document.querySelectorAll('.l-w').forEach(x=>x.innerText=lMap[v].w); document.querySelectorAll('.l-s').forEach(x=>x.innerText=lMap[v].s); }

        render();
    </script>
</body>
</html>
