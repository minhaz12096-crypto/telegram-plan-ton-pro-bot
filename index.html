<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plant-TON Pro</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; font-family: sans-serif; color: white; overflow: hidden; }

        /* --- Video Loader --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: #76d275; display: flex; align-items: center; justify-content: center;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; background: #76d275; }

        /* --- Game UI --- */
        #app { display: none; height: 100vh; background: url('https://i.postimg.cc/0jLnTqx9/1775464928626.png') center/cover no-repeat; position: relative; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 0; }

        .ui-container { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .wallet-btn { transform: scale(0.8); }
        .stats { background: rgba(141, 110, 99, 0.9); border: 2px solid #b8860b; padding: 8px 15px; border-radius: 20px; font-weight: bold; }

        .mining-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tree-btn { width: 220px; transition: transform 0.1s; cursor: pointer; }
        .tree-btn:active { transform: scale(0.9); }

        .footer-menu { display: flex; justify-content: space-around; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 20px 20px 0 0; }
        .btn-action { background: #4caf50; border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <video id="intro-video" autoplay muted playsinline>
            <source src="1000004531.mp4" type="video/mp4">
        </video>
    </div>

    <div id="app">
        <div class="overlay"></div>
        <div class="ui-container">
            <div class="header">
                <div class="stats">💎 <span id="balance">0.0000</span> TON</div>
                <div id="ton-connect-button" class="wallet-btn"></div>
            </div>

            <div class="mining-area">
                <img src="https://i.postimg.cc/0jLnTqx9/1775464928626.png" class="tree-btn" onclick="mine()">
                <p style="margin-top: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px;">Click to Mine</p>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn-action" style="background: #2196f3;" onclick="deposit()">Invest TON</button>
            </div>

            <div class="footer-menu">
                <div>🏠<br>Home</div>
                <div>🚜<br>Farm</div>
                <div>👥<br>Team</div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('intro-video');
        const loader = document.getElementById('loader');
        const app = document.getElementById('app');

        // ভিডিও শেষ হলে বা লোড না হলে ৫ সেকেন্ড পর গেম চালু হবে
        function startGame() {
            loader.style.display = 'none';
            app.style.display = 'block';
        }

        video.onended = startGame;
        setTimeout(startGame, 5000); // Fail-safe (ভিডিও না চললে ৫ সেকেন্ড পর শুরু হবে)

        // TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://your-domain.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Mining Logic
        let score = 0.0000;
        function mine() {
            score += 0.0001;
            document.getElementById('balance').innerText = score.toFixed(4);
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        // Deposit (TON Blockchain)
        async function deposit() {
            if (!tonConnectUI.connected) return alert("Connect Wallet First!");
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{
                    address: "UQCgHCVc-ZZ-L9UjN4-yjUAHn2ydmfqQvPVywZrrQYQP-Qkj", // আপনার TON ওয়ালেট এড্রেস দিন
                    amount: "1000000000" // 1 TON
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Deposit Success!");
            } catch (e) {
                alert("Transaction Canceled");
            }
        }
    </script>
</body>
</html>
