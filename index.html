<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan-Ton App Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/js-sdk/direct-ads.js"></script>

    <style>
        /* === ডার্ক প্রিমিয়াম ও ফুল মুন ডিজাইন === */
        :root { --gold: #ffd700; --bg-dark: #0a0705; --wood: #8d6e63; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; overflow-y: auto; background-color: #000;
        }

        /* Full Moon Background */
        .moon-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1522030299830-16b8d3d049fe?q=80&w=1080') no-repeat center center;
            background-size: cover; z-index: -1;
        }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -1; }

        /* 3 Second Loading Screen */
        #loader { 
            position: fixed; inset: 0; z-index: 99999; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease;
        }
        .moon-loader-img { width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 0 50px rgba(255,255,255,0.6); margin-bottom: 30px; object-fit: cover; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,215,0,0.2); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main App Area */
        #app { display: none; min-height: 100vh; flex-direction: column; position: relative; padding-bottom: 30px; }
        
        /* Top Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); backdrop-filter: blur(10px); }
        .balance-box { background: rgba(255,215,0,0.15); border: 1.5px solid var(--gold); padding: 8px 15px; border-radius: 30px; font-weight: bold; font-size: 16px; color: var(--gold); display:flex; align-items:center; gap:8px;}
        .settings-btn { font-size: 24px; background: none; border: none; color: #fff; cursor: pointer; transition: 0.3s; }

        /* Dashboard Buttons (No Bottom Menu) */
        .dashboard-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: rgba(0,0,0,0.5); margin: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .dash-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--wood); padding: 12px 5px; border-radius: 12px; color: #fff; font-size: 12px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; }
        .dash-btn:active { background: var(--gold); color: #000; border-color: var(--gold); }
        .dash-btn i { font-size: 22px; }

        /* 10 Slot Farm Grid */
        .farm-container { padding: 15px; }
        .farm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .plot { 
            background: rgba(30, 20, 15, 0.9); border: 3px solid var(--wood); border-radius: 15px; 
            height: 170px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        .plot.locked { border-color: #333; background: rgba(15,15,15,0.95); }
        .plot.ready { border-color: var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 20px var(--gold); } 100% { box-shadow: 0 0 5px var(--gold); } }
        
        .icon-large { font-size: 55px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .action-btn { background: var(--gold); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; width: 85%; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 2px solid var(--gold); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; background: none; border: none; color: red; cursor: pointer; }

        .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .lang-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 13px; }
        .lang-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        
        input[type="number"] { width: 85%; padding: 15px; border-radius: 10px; border: 2px solid var(--wood); background: #222; color: #fff; text-align: center; font-size: 18px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="moon-bg"></div>
    <div class="overlay"></div>
    <audio id="bgMusic" loop src="https://www.bensound.com/bensound-music/bensound-relaxing.mp3"></audio>

    <div id="loader">
        <img src="https://images.unsplash.com/photo-1522030299830-16b8d3d049fe?q=80&w=500" class="moon-loader-img" alt="Moon">
        <div class="spinner"></div>
        <h2 style="color:var(--gold); margin-top:20px; font-weight:bold; letter-spacing: 1px;" id="t-loading">Loading Universe...</h2>
    </div>

    <div id="app">
        
        <div class="header">
            <div class="balance-box">💎 <span id="ui-bal">0.000</span></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="ton-connect-header"></div> <button class="settings-btn" onclick="openModal('settingsModal')">⚙️</button>
            </div>
        </div>

        <div class="dashboard-menu">
            <div class="dash-btn" onclick="openModal('withdrawModal')"><i style="color:#4caf50">💸</i> <span id="t-withdraw">Withdraw</span></div>
            <div class="dash-btn" onclick="openModal('tasksModal')"><i style="color:#2196f3">📋</i> <span id="t-tasks">Tasks</span></div>
            <div class="dash-btn" onclick="watchAd()"><i style="color:#ff9800">📺</i> <span id="t-ads">Ads (<span id="ui-ads">0</span>)</span></div>
            <div class="dash-btn" onclick="copyRef()"><i style="color:#e91e63">👥</i> <span id="t-ref">Refer</span></div>
        </div>

        <div class="farm-container">
            <h3 style="text-align:center; color:var(--gold); margin-bottom:15px; font-size:22px; border-bottom: 1px solid var(--wood); padding-bottom:10px;" id="t-farm-title">YOUR LUNAR FARM</h3>
            <div class="farm-grid" id="farm-grid">
                </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('settingsModal')">✖</button>
            <h2 id="t-set-title" style="color:var(--gold);">Settings</h2>
            
            <button class="action-btn" id="musicBtn" onclick="toggleMusic()" style="width:100%; margin:20px 0; font-size:16px;">🔊 Music: OFF</button>
            
            <h4 style="margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;">Select Language</h4>
            <div class="lang-grid">
                <button class="lang-btn" onclick="changeLang('bn')">🇧🇩 Bangla</button>
                <button class="lang-btn active" onclick="changeLang('en')">🇺🇸 English</button>
                <button class="lang-btn" onclick="changeLang('ru')">🇷🇺 Russian</button>
                <button class="lang-btn" onclick="changeLang('hi')">🇮🇳 Hindi</button>
                <button class="lang-btn" onclick="changeLang('ja')">🇯🇵 Japan</button>
                <button class="lang-btn" onclick="changeLang('de')">🇩🇪 Germany</button>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('withdrawModal')">✖</button>
            <h2 style="color:var(--gold);" id="t-w-title">Withdraw TON</h2>
            
            <div id="w-status-box" style="padding:15px; border-radius:10px; margin-bottom:15px; font-weight:bold; display:none; border:1px solid;"></div>

            <p style="color:#aaa; font-size:13px; margin-bottom:10px;">Ensure your wallet is connected above!</p>
            <input type="number" id="w-amt" placeholder="Enter Amount">
            <button class="action-btn" style="width:85%; font-size:16px;" onclick="requestWithdraw()">Confirm Request</button>
            <p style="color:#ff9800; font-size:12px; margin-top:15px;">*Min 10 Ads required for withdrawal.</p>
        </div>
    </div>

    <div id="tasksModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('tasksModal')">✖</button>
            <h2 style="color:var(--gold);">Daily Tasks</h2>
            <div style="background:#1a1a1a; padding:15px; border-radius:12px; border:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold;">Join Official Channel</span>
                <button class="action-btn" style="width:auto; margin:0;" onclick="tg.openTelegramLink('https://t.me/telegram')">Go</button>
            </div>
        </div>
    </div>

    <script>
        // 1. GUARANTEED 3-SECOND LOADER (সবার আগে লোডার ফিক্স)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const app = document.getElementById('app');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { 
                        loader.style.display = 'none'; 
                        app.style.display = 'flex'; 
                    }, 500);
                }
            }, 3000); // ঠিক ৩ সেকেন্ড পর ওপেন হবেই
        });

        // 2. Telegram Init
        let tg, uid = "dev_user";
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
            uid = tg.initDataUnsafe?.user?.id || "dev_user";
        } catch(e) { console.log("Not in Telegram"); }

        // 3. SAFE Firebase Init
        const firebaseConfig = { apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U", databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com", projectId: "tonnow-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 4. SAFE SDK Init (Ton & Adsgram)
        let tonConnectUI = null;
        try {
            // Header এ টার্গেট দিয়েছি যাতে এরর না খায়
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ 
                manifestUrl: 'https://telegram-plan-ton-pro-bot.vercel.app/tonconnect-manifest.json', 
                buttonRootId: 'ton-connect-header' 
            });
        } catch(e) { console.log("TON UI Error"); }

        let AdController = null;
        if(window.Adsgram) { AdController = window.Adsgram.init({ blockId: "2627" }); }

        // 5. Global State
        let uData = { bal: 0, ads: 0, wStatus: '', farm: {}, lang: 'en', music: false };
        let prevStatus = ''; 

        // Language Config
        const dict = {
            'en': { load: "Loading Universe...", w: "Withdraw", t: "Tasks", a: "Ads", r: "Refer", fTitle: "YOUR LUNAR FARM", lock: "Locked", buy: "Buy", grow: "Growing", claim: "Claim" },
            'bn': { load: "লোডিং হচ্ছে...", w: "উইথড্র", t: "টাস্ক", a: "অ্যাড", r: "রেফার", fTitle: "আপনার খামার", lock: "লকড", buy: "কিনুন", grow: "বড় হচ্ছে", claim: "সংগ্রহ" },
            'ru': { load: "Загрузка...", w: "Вывод", t: "Задачи", a: "Реклама", r: "Рефералы", fTitle: "Ваша ферма", lock: "Закрыто", buy: "Купить", grow: "Растет", claim: "Собрать" },
            'hi': { load: "लोड हो रहा है...", w: "निकालना", t: "कार्य", a: "विज्ञापन", r: "रेफर", fTitle: "आपका खेत", lock: "बंद है", buy: "खरीदें", grow: "बढ़ रहा है", claim: "दावा करें" },
            'ja': { load: "ロード中...", w: "撤退", t: "タスク", a: "広告", r: "参照", fTitle: "あなたの農場", lock: "ロック", buy: "買う", grow: "成長中", claim: "請求" },
            'de': { load: "Laden...", w: "Auszahlen", t: "Aufgaben", a: "Anzeigen", r: "Verweisen", fTitle: "Deine Farm", lock: "Gesperrt", buy: "Kaufen", grow: "Wachsen", claim: "Sammeln" }
        };

        // 6. DB Sync & Bot SMS Alerts
        db.ref('users/' + uid).on('value', snap => {
            const val = snap.val();
            if(val) {
                uData = val;
                document.getElementById('ui-bal').innerText = (uData.bal || 0).toFixed(3);
                document.getElementById('ui-ads').innerText = uData.ads || 0;
                
                // === BOT SMS SYSTEM ===
                if(prevStatus === 'pending' && uData.wStatus === 'approved') {
                    if(tg && tg.showAlert) tg.showAlert("✅ Admin Approved Your Withdraw! Please check your wallet.");
                } else if (prevStatus === 'pending' && uData.wStatus === 'rejected') {
                    if(tg && tg.showAlert) tg.showAlert("❌ Admin Rejected Your Withdraw! Contact support.");
                }
                prevStatus = uData.wStatus; 

                updateWithdrawUI(uData.wStatus);
                renderFarm();
                if(uData.lang) updateLangText(uData.lang);
            } else {
                db.ref('users/' + uid).set({ bal: 5, ads: 0, wStatus: '', farm: {}, lang: 'en' });
            }
        });

        // 7. 10 Slot Farming System
        const COST = 2; // Unlock Cost
        const PROFIT = 5; // Reward
        const GROW_TIME = 24 * 3600000; // 24 Hours

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            const l = uData.lang || 'en';
            
            for(let i=1; i<=10; i++) {
                const sID = 'slot_' + i;
                const sData = uData.farm?.[sID];
                const div = document.createElement('div');
                div.className = 'plot';

                if(!sData) {
                    div.classList.add('locked');
                    div.innerHTML = `<div class="icon-large">🔒</div>
                                     <div style="color:#888; margin-top:8px;">${dict[l].lock}</div>
                                     <button class="action-btn" onclick="buyPlot('${sID}')">${dict[l].buy} ${COST}T</button>`;
                } else {
                    const timeLeft = sData.end - Date.now();
                    if(timeLeft > 0) {
                        div.innerHTML = `<div class="icon-large">🌱</div>
                                         <div style="color:var(--gold); font-weight:bold; margin-top:8px;">${dict[l].grow}</div>
                                         <div id="t-${sID}" style="font-family:monospace; margin-top:5px; font-size:16px;">--:--:--</div>`;
                        runTimer(sID, sData.end);
                    } else {
                        div.classList.add('ready');
                        div.innerHTML = `<div class="icon-large">🌳🍎</div>
                                         <button class="action-btn" onclick="claimPlot('${sID}')">${dict[l].claim} +${PROFIT}</button>`;
                    }
                }
                grid.appendChild(div);
            }
        }

        function runTimer(id, endTime) {
            const intv = setInterval(() => {
                const diff = endTime - Date.now();
                const el = document.getElementById('t-'+id);
                if(diff <= 0 || !el) { clearInterval(intv); renderFarm(); }
                else {
                    const h = String(Math.floor(diff/3600000)).padStart(2, '0');
                    const m = String(Math.floor((diff%3600000)/60000)).padStart(2, '0');
                    const s = String(Math.floor((diff%60000)/1000)).padStart(2, '0');
                    el.innerText = `${h}:${m}:${s}`;
                }
            }, 1000);
        }

        function buyPlot(id) {
            if(uData.bal >= COST) {
                db.ref('users/'+uid).update({ bal: uData.bal - COST });
                db.ref('users/'+uid+'/farm/'+id).set({ end: Date.now() + GROW_TIME });
            } else { if(tg && tg.showAlert) tg.showAlert("Insufficient TON!"); }
        }

        function claimPlot(id) {
            db.ref('users/'+uid).update({ bal: uData.bal + PROFIT });
            db.ref('users/'+uid+'/farm/'+id).remove(); 
        }

        // 8. Withdraw System
        function requestWithdraw() {
            const amt = document.getElementById('w-amt').value;
            if(tonConnectUI && !tonConnectUI.connected) {
                if(tg && tg.showAlert) tg.showAlert("Connect wallet from top header first!");
                return;
            }
            if(uData.ads < 10) return tg.showAlert ? tg.showAlert("Watch 10 Ads first!") : alert("Watch 10 Ads first!");
            if(amt < 1 || amt > uData.bal) return tg.showAlert ? tg.showAlert("Invalid Amount!") : alert("Invalid Amount!");
            
            db.ref('users/'+uid).update({ wStatus: 'pending', wAmt: amt });
            if(tg && tg.showAlert) tg.showAlert("Request Sent! Admin will verify soon.");
            closeModal('withdrawModal');
        }

        function updateWithdrawUI(status) {
            const box = document.getElementById('w-status-box');
            if(!status) { box.style.display = 'none'; return; }
            box.style.display = 'block';
            if(status === 'pending') { box.style.background = '#ff980033'; box.style.color = '#ff9800'; box.style.borderColor = '#ff9800'; box.innerHTML = "⏳ Status: Pending Admin Approval"; }
            else if(status === 'approved') { box.style.background = '#4caf5033'; box.style.color = '#4caf50'; box.style.borderColor = '#4caf50'; box.innerHTML = "✅ Status: Withdraw Approved!"; }
            else if(status === 'rejected') { box.style.background = '#f4433633'; box.style.color = '#f44336'; box.style.borderColor = '#f44336'; box.innerHTML = "❌ Status: Withdraw Rejected!"; }
        }

        // 9. Extra Features (Ads, Refer, Language, Music)
        async function watchAd() {
            if(!AdController) { if(tg && tg.showAlert) tg.showAlert("Ads loading..."); return; }
            try { 
                await AdController.show(); 
                db.ref('users/'+uid).update({ ads: (uData.ads || 0) + 1 });
            } catch(e) { console.log(e); }
        }

        function copyRef() {
            const link = `https://t.me/YourBot_bot?start=${uid}`;
            if(tg && tg.openTelegramLink) tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=Join My Full Moon Farm!`);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleMusic() {
            const bgm = document.getElementById('bgMusic');
            uData.music = !uData.music;
            if(uData.music) { bgm.play(); document.getElementById('musicBtn').innerText = "🔊 Music: ON"; }
            else { bgm.pause(); document.getElementById('musicBtn').innerText = "🔊 Music: OFF"; }
        }

        function changeLang(l) {
            db.ref('users/'+uid).update({ lang: l });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateLangText(l) {
            if(!dict[l]) return;
            document.getElementById('t-loading').innerText = dict[l].load;
            document.getElementById('t-withdraw').innerText = dict[l].w;
            document.getElementById('t-tasks').innerText = dict[l].t;
            document.getElementById('t-ads').childNodes[0].nodeValue = dict[l].a + " (";
            document.getElementById('t-ref').innerText = dict[l].r;
            document.getElementById('t-farm-title').innerText = dict[l].fTitle;
        }
    </script>
</body>
</html>
